name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Lint Backend
        working-directory: ./backend
        run: |
          pnpm install
          pnpm run lint

      - name: Lint Frontend
        working-directory: ./frontend
        run: |
          pnpm install
          pnpm run lint

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ai-task-platform-backend:${{ github.sha }},${{ secrets.DOCKER_USERNAME }}/ai-task-platform-backend:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ai-task-platform-frontend:${{ github.sha }},${{ secrets.DOCKER_USERNAME }}/ai-task-platform-frontend:latest

      - name: Build and Push Worker Image
        uses: docker/build-push-action@v4
        with:
          context: ./worker
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ai-task-platform-worker:${{ github.sha }},${{ secrets.DOCKER_USERNAME }}/ai-task-platform-worker:latest

  update-infra:
    needs: lint-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Infra Repo
        uses: actions/checkout@v3
        with:
          repository: your-username/ai-task-platform-infra
          token: ${{ secrets.PAT_TOKEN }}
          path: infra

      - name: Update Kubernetes Manifests
        working-directory: ./infra
        run: |
          sed -i 's|image: .*/ai-task-platform-backend:.*|image: ${{ secrets.DOCKER_USERNAME }}/ai-task-platform-backend:${{ github.sha }}|g' base/backend/deployment.yaml
          sed -i 's|image: .*/ai-task-platform-frontend:.*|image: ${{ secrets.DOCKER_USERNAME }}/ai-task-platform-frontend:${{ github.sha }}|g' base/frontend/deployment.yaml
          sed -i 's|image: .*/ai-task-platform-worker:.*|image: ${{ secrets.DOCKER_USERNAME }}/ai-task-platform-worker:${{ github.sha }}|g' base/worker/deployment.yaml
          
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add base/*/deployment.yaml
          git commit -m "Update images to commit ${{ github.sha }}"
          git push
